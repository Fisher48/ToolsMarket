<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи - Админка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <style>
        .filter-section {
            background-color: #f8fafc;
            border: 1px solid #e9ecef;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .table-actions {
            white-space: nowrap;
            min-width: 130px;
        }
        /* Стильные бейджи с полупрозрачным фоном */
        .badge-user-type {
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            display: inline-block;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        /* REGULAR("Обычный") - серый */
        .badge-user-type-REGULAR,
        .badge-user-type-Обычный {
            background: rgba(108, 117, 125, 0.2);  /* более насыщенный фон */
            color: #2c3e50;  /* темно-серый текст */
            border-color: #6c757d;
        }

        /* WHOLESALER("ОПТ") - зеленый */
        .badge-user-type-WHOLESALER,
        .badge-user-type-ОПТ {
            background: rgba(25, 135, 84, 0.2);
            color: #0b5e2e;  /* темно-зеленый текст */
            border-color: #198754;
        }

        /* VIP("ВИП") - фиолетовый */
        .badge-user-type-VIP,
        .badge-user-type-ВИП {
            background: rgba(111, 66, 193, 0.2);
            color: #4a2e8a;  /* темно-фиолетовый текст */
            border-color: #6f42c1;
        }

        /* DISTRIBUTOR("Дистрибьютор") - синий */
        .badge-user-type-DISTRIBUTOR,
        .badge-user-type-Дистрибьютор {
            background: rgba(13, 110, 253, 0.2);
            color: #084298;  /* темно-синий текст */
            border-color: #0d6efd;
        }

        /* SETY("Сети") - оранжевый */
        .badge-user-type-SETY,
        .badge-user-type-Сети {
            background: rgba(253, 126, 20, 0.2);
            color: #b45b06;  /* темно-оранжевый текст */
            border-color: #fd7e14;
        }

        /* PARTNER("Партнер") - бирюзовый */
        .badge-user-type-PARTNER,
        .badge-user-type-Партнер {
            background: rgba(32, 201, 151, 0.2);
            color: #138d6b;  /* темно-бирюзовый текст */
            border-color: #20c997;
        }

        /* MAXIMUM("ПартнерМакс") - красный */
        .badge-user-type-MAXIMUM,
        .badge-user-type-ПартнерМакс {
            background: rgba(220, 53, 69, 0.2);
            color: #a11f2e;  /* темно-красный текст */
            border-color: #dc3545;
        }

        /* При наведении - усиление */
        .badge-user-type:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            background: rgba(var(--primary), 0.25);
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Сайдбар -->
        <div class="col-md-3 col-lg-2 px-0">
            <div th:replace="~{fragments/admin-panel :: admin-panel}"></div>
        </div>

        <!-- Main content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="content pt-3">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap
                align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Управление пользователями</h1>
                </div>

                <!-- Сообщения -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Фильтры -->
                <div class="filter-section p-3">
                    <form method="get" class="row g-2 align-items-end">
                        <!-- Скрытые поля -->
                        <input type="hidden" name="sort" th:value="${currentSort}">
                        <input type="hidden" name="page" value="0">

                        <!-- Поиск по имени/email -->
                        <div class="col-md-3">
                            <label class="form-label small text-muted">Поиск</label>
                            <input type="text" name="search"
                                   class="form-control form-control-sm"
                                   placeholder="Имя, email, телефон..."
                                   th:value="${param.search}">
                        </div>

                        <!-- Тип пользователя -->
                        <div class="col-md-2">
                            <label class="form-label small text-muted">Тип пользователя</label>
                            <select name="userType" class="form-select form-select-sm">
                                <option value="">Все типы</option>
                                <option th:each="type : ${userTypes}"
                                        th:value="${type}"
                                        th:text="${type.getDisplayName()}"
                                        th:selected="${param.userType != null and param.userType[0] == type}">
                                </option>
                            </select>
                        </div>

                        <!-- Статус -->
                        <div class="col-md-2">
                            <label class="form-label small text-muted">Статус</label>
                            <select name="enabled" class="form-select form-select-sm">
                                <option value="">Все</option>
                                <option value="true" th:selected="${param.enabled != null and param.enabled[0] == 'true'}">Активные</option>
                                <option value="false" th:selected="${param.enabled != null and param.enabled[0] == 'false'}">Заблокированные</option>
                            </select>
                        </div>

                        <!-- Кнопки -->
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100 me-2">
                                <i class="fas fa-search me-1"></i> Поиск
                            </button>
                            <a th:href="@{/admin/users}" class="btn btn-outline-secondary">
                                <i class="fas fa-times"></i>
                            </a>
                        </div>
                    </form>
                </div>

                <!-- Таблица пользователей -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Список пользователей (<span th:text="${totalItems}"></span>)</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                <tr>
                                    <th>
                                        <a th:href="@{/admin/users(sort='id,' + (${currentSort == 'id,asc'} ? 'desc' : 'asc'),
                                               search=${param.search}, userType=${param.userType}, enabled=${param.enabled})}">
                                            ID
                                            <i th:if="${currentSort.startsWith('id')}"
                                               th:class="${currentSort == 'id,asc'} ? 'fas fa-sort-up' : 'fas fa-sort-down'"></i>
                                            <i th:unless="${currentSort.startsWith('id')}" class="fas fa-sort text-muted"></i>
                                        </a>
                                    </th>
                                    <th>
                                        <a th:href="@{/admin/users(sort='lastName,' + (${currentSort == 'lastName,asc'} ? 'desc' : 'asc'),
                                               search=${param.search}, userType=${param.userType}, enabled=${param.enabled})}">
                                            Имя
                                            <i th:if="${currentSort.startsWith('lastName')}"
                                               th:class="${currentSort == 'lastName,asc'} ? 'fas fa-sort-up' : 'fas fa-sort-down'"></i>
                                            <i th:unless="${currentSort.startsWith('lastName')}" class="fas fa-sort text-muted"></i>
                                        </a>
                                    </th>
                                    <th>Примечание</th>
                                    <th>
                                        <a th:href="@{/admin/users(sort='email,' + (${currentSort == 'email,asc'} ? 'desc' : 'asc'),
                                               search=${param.search}, userType=${param.userType}, enabled=${param.enabled})}">
                                            Email
                                            <i th:if="${currentSort.startsWith('email')}"
                                               th:class="${currentSort == 'email,asc'} ? 'fas fa-sort-up' : 'fas fa-sort-down'"></i>
                                            <i th:unless="${currentSort.startsWith('email')}" class="fas fa-sort text-muted"></i>
                                        </a>
                                    </th>
                                    <th>
                                        <a th:href="@{/admin/users(sort='userType,' + (${currentSort == 'userType,asc'} ? 'desc' : 'asc'),
                                               search=${param.search}, userType=${param.userType}, enabled=${param.enabled})}">
                                            Тип пользователя
                                            <i th:if="${currentSort.startsWith('userType')}"
                                               th:class="${currentSort == 'userType,asc'} ? 'fas fa-sort-up' : 'fas fa-sort-down'"></i>
                                            <i th:unless="${currentSort.startsWith('userType')}" class="fas fa-sort text-muted"></i>
                                        </a>
                                    </th>
                                    <th>
                                        <a th:href="@{/admin/users(sort='enabled,' + (${currentSort == 'enabled,asc'} ? 'desc' : 'asc'),
                                               search=${param.search}, userType=${param.userType}, enabled=${param.enabled})}">
                                            Статус
                                            <i th:if="${currentSort.startsWith('enabled')}"
                                               th:class="${currentSort == 'enabled,asc'} ? 'fas fa-sort-up' : 'fas fa-sort-down'"></i>
                                            <i th:unless="${currentSort.startsWith('enabled')}" class="fas fa-sort text-muted"></i>
                                        </a>
                                    </th>
                                    <th>
                                        <a th:href="@{/admin/users(sort='createdAt,' + (${currentSort == 'createdAt,asc'} ? 'desc' : 'asc'),
                                               search=${param.search}, userType=${param.userType}, enabled=${param.enabled})}">
                                            Дата регистрации
                                            <i th:if="${currentSort.startsWith('createdAt')}"
                                               th:class="${currentSort == 'createdAt,asc'} ? 'fas fa-sort-up' : 'fas fa-sort-down'"></i>
                                            <i th:unless="${currentSort.startsWith('createdAt')}" class="fas fa-sort text-muted"></i>
                                        </a>
                                    </th>
                                    <th>Действия</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="user : ${users}"
                                    th:class="${user.enabled} ? '' : 'table-secondary'">
                                    <td th:text="${user.id}"></td>
                                    <td>
                                        <strong th:text="${user.firstName + ' ' + user.lastName}"></strong>
                                        <br>
                                        <small class="text-muted"
                                               th:text="${user.username}"></small>
                                    </td>
                                    <td th:text="${user.note}"></td>
                                    <td th:text="${user.email}"></td>
                                    <td>
                                        <span class="badge-user-type"
                                              th:classappend="${user.userType != null}
                                              ? 'badge-user-type-' + ${user.userType.name()}
                                              : 'badge-user-type-REGULAR'">
                                            <span th:text="${user.userType != null ?
                                            user.userType.getDisplayName() : 'Обычный'}"></span>
                                        </span>
                                    </td>
                                    <td>
                                        <span th:if="${user.enabled}" class="text-success">
                                            <i class="fas fa-check-circle"></i> Активен
                                        </span>
                                        <span th:unless="${user.enabled}" class="text-danger">
                                            <i class="fas fa-times-circle"></i> Заблокирован
                                        </span>
                                    </td>
                                    <td th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy')}"></td>
                                    <td class="table-actions">
                                        <a th:href="@{/admin/users/{id}(id=${user.id})}"
                                           class="btn btn-sm btn-outline-primary" title="Просмотр">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                                           class="btn btn-sm btn-outline-secondary" title="Редактировать">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <form th:action="@{/admin/users/{id}/toggle-status(id=${user.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit"
                                                    class="btn btn-sm btn-outline-warning"
                                                    th:title="${user.enabled} ? 'Деактивировать' : 'Активировать'">
                                                <i th:if="${user.enabled}" class="fas fa-toggle-on"></i>
                                                <i th:unless="${user.enabled}" class="fas fa-toggle-off"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(users)}">
                                    <td colspan="8" class="text-center text-muted py-4">
                                        Пользователи не найдены
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Пагинация как в товарах -->
                <nav class="mt-3">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${currentPage - 1},
                                   sort=${currentSort},
                                   search=${param.search},
                                   userType=${param.userType},
                                   enabled=${param.enabled})}">
                                Назад
                            </a>
                        </li>

                        <li class="page-item disabled">
                            <span class="page-link"
                                  th:text="${currentPage + 1} + ' / ' + ${totalPages}">
                            </span>
                        </li>

                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${currentPage + 1},
                                   sort=${currentSort},
                                   search=${param.search},
                                   userType=${param.userType},
                                   enabled=${param.enabled})}">
                                Вперёд
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
