<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление категориями - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
</head>
<body>
<!-- Контейнер с сайдбаром и основным контентом -->
<div class="container-fluid">
    <div class="row">
        <!-- Сайдбар -->
        <div class="col-md-3 col-lg-2 px-0">
            <div th:replace="~{fragments/admin-panel :: admin-panel}"></div>
        </div>

        <!-- Основной контент -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="content pt-3">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Управление категориями</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{/admin/categories/new}" class="btn btn-primary">
                            <i class="fas fa-plus me-1"></i> Добавить категорию
                        </a>
                    </div>
                </div>

                <!-- Messages -->
                <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${message}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Фильтры -->
                <div class="card mb-3">
                    <div class="card-body">
                        <form method="get" class="row g-3">
                            <input type="hidden" name="sort" th:value="${currentSort}">
                            <input type="hidden" name="page" value="0">

                            <div class="col-md-3">
                                <label class="form-label small text-muted">Название</label>
                                <input type="text" name="name" class="form-control form-control-sm"
                                       placeholder="Название категории" th:value="${param.name}">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label small text-muted">URL</label>
                                <input type="text" name="title" class="form-control form-control-sm"
                                       placeholder="URL категории" th:value="${param.title}">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label small text-muted">Родительская категория</label>
                                <select name="parentId" class="form-select form-select-sm">
                                    <option value="">Все категории</option>
                                    <option th:each="cat : ${allCategories}"
                                            th:value="${cat.id}"
                                            th:text="${cat.name}"
                                            th:selected="${param.parentId != null and param.parentId[0] == cat.id}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-3 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary btn-sm w-100 me-2">
                                    <i class="fas fa-search me-1"></i> Поиск
                                </button>
                                <a th:href="@{/admin/categories}" class="btn btn-outline-secondary btn-sm">
                                    <i class="fas fa-times"></i>
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Content -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Список категорий</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                <tr>
                                    <th>
                                        <a th:href="@{/admin/categories(sort='id,' + (${currentSort == 'id,asc'} ? 'desc' : 'asc'),
                                               name=${param.name}, title=${param.title}, parentId=${param.parentId})}">
                                            ID
                                            <i th:if="${currentSort.startsWith('id')}"
                                               th:class="${currentSort == 'id,asc'} ? 'fas fa-sort-up' : 'fas fa-sort-down'"></i>
                                            <i th:unless="${currentSort.startsWith('id')}" class="fas fa-sort text-muted"></i>
                                        </a>
                                    </th>
                                    <th>
                                        <a th:href="@{/admin/categories(sort='name,' + (${currentSort == 'name,asc'} ? 'desc' : 'asc'),
                                               name=${param.name}, title=${param.title}, parentId=${param.parentId})}">
                                            Название
                                            <i th:if="${currentSort.startsWith('name')}"
                                               th:class="${currentSort == 'name,asc'} ? 'fas fa-sort-up' : 'fas fa-sort-down'"></i>
                                            <i th:unless="${currentSort.startsWith('name')}" class="fas fa-sort text-muted"></i>
                                        </a>
                                    </th>
                                    <th>URL</th>
                                    <th>Характеристики</th>
                                    <th>Родитель</th>
                                    <th>
                                        <a th:href="@{/admin/categories(sort='sortOrder,' + (${currentSort == 'sortOrder,asc'} ? 'desc' : 'asc'),
                                               name=${param.name}, title=${param.title}, parentId=${param.parentId})}">
                                            Порядок
                                            <i th:if="${currentSort.startsWith('sortOrder')}"
                                               th:class="${currentSort == 'sortOrder,asc'} ? 'fas fa-sort-up' : 'fas fa-sort-down'"></i>
                                            <i th:unless="${currentSort.startsWith('sortOrder')}" class="fas fa-sort text-muted"></i>
                                        </a>
                                    </th>
                                    <th>Дочерние</th>
                                    <th>
                                        <a th:href="@{/admin/categories(sort='createdAt,' + (${currentSort == 'createdAt,asc'} ? 'desc' : 'asc'),
                                               name=${param.name}, title=${param.title}, parentId=${param.parentId})}">
                                            Дата создания
                                            <i th:if="${currentSort.startsWith('createdAt')}"
                                               th:class="${currentSort == 'createdAt,asc'} ? 'fas fa-sort-up' : 'fas fa-sort-down'"></i>
                                            <i th:unless="${currentSort.startsWith('createdAt')}" class="fas fa-sort text-muted"></i>
                                        </a>
                                    </th>
                                    <th>Действия</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="category : ${categoryPage.content}">
                                    <td th:text="${category.id}"></td>
                                    <td>
                                        <strong th:text="${category.name}"></strong>
                                    </td>
                                    <td th:text="${category.title}"></td>
                                    <td>
                                        <span class="badge bg-info" th:text="${category.attributesCount}">0</span>
                                        <a th:href="@{/admin/categories/{id}/attributes(id=${category.id})}"
                                           class="btn btn-sm btn-outline-secondary ms-1">
                                            <i class="fas fa-cog"></i>
                                        </a>
                                    </td>
                                    <td>
                                        <span th:if="${category.parentName != null}"
                                              class="badge bg-secondary" th:text="${category.parentName}"></span>
                                        <span th:if="${category.parentName == null}" class="text-muted">—</span>
                                    </td>
                                    <td th:text="${category.sortOrder}">0</td>
                                    <td>
                                        <span th:if="${category.childrenCount > 0}"
                                              class="badge bg-info" th:text="${category.childrenCount}"></span>
                                        <span th:if="${category.childrenCount == 0}" class="text-muted">—</span>
                                    </td>
                                    <td th:text="${#temporals.format(category.createdAt, 'dd.MM.yyyy')}">—

                                    <td class="table-actions">
                                        <a th:href="@{/admin/categories/{id}(id=${category.id})}"
                                           class="btn btn-sm btn-outline-primary" title="Просмотр">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        <a th:href="@{/admin/categories/{id}/edit(id=${category.id})}"
                                           class="btn btn-sm btn-outline-secondary" title="Редактировать">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <a th:href="@{/admin/categories/{id}/attributes(id=${category.id})}"
                                           class="btn btn-sm btn-outline-info" title="Управление атрибутами">
                                            <i class="fas fa-list-check"></i>
                                        </a>
                                        <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}"
                                              method="post" class="d-inline"
                                              onsubmit="return confirm('Вы уверены, что хотите удалить эту категорию?');">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Удалить">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${categoryPage.isEmpty()}">
                                    <td colspan="9" class="text-center text-muted py-4">
                                        <i class="fas fa-folder-open fa-2x mb-2"></i>
                                        <br>
                                        Категории не найдены
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Пагинация -->
                <nav th:if="${categoryPage.totalPages > 1}" class="mt-3">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${!categoryPage.hasPrevious()} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/categories(page=${categoryPage.number - 1},
                                   sort=${currentSort}, name=${param.name}, title=${param.title}, parentId=${param.parentId})}">
                                Назад
                            </a>
                        </li>

                        <li class="page-item disabled">
                            <span class="page-link" th:text="${categoryPage.number + 1} + ' / ' + ${categoryPage.totalPages}"></span>
                        </li>

                        <li class="page-item" th:classappend="${!categoryPage.hasNext()} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/categories(page=${categoryPage.number + 1},
                                   sort=${currentSort}, name=${param.name}, title=${param.title}, parentId=${param.parentId})}">
                                Вперёд
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
