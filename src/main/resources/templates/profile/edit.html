<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование профиля - ToolsMarket48</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #0d2e67;
            --primary-dark: #0a1f3f;
            --primary-light: #2a4b8c;
            --accent: #E63946;
            --text: #2C3E50;
            --text-light: #5F6B7A;
            --bg-body: #f4f6f9;
            --card-bg: #FFFFFF;
            --shadow-sm: 0 2px 8px rgba(13, 46, 103, 0.08);
            --shadow-md: 0 4px 16px rgba(13, 46, 103, 0.12);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: linear-gradient(135deg, var(--bg-body) 0%, #e9ecef 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }

        .navbar.bg-dark {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%) !important;
            box-shadow: var(--shadow-md);
            padding: 16px 0;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: white !important;
        }

        .navbar-brand i {
            color: var(--accent);
            margin-right: 8px;
        }

        .nav-link {
            color: rgba(255,255,255,0.9) !important;
            transition: var(--transition);
        }

        .nav-link:hover {
            color: var(--accent) !important;
        }

        .card {
            border: none;
            border-radius: 24px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: 0 8px 28px rgba(13, 46, 103, 0.15);
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 20px 28px;
            border-bottom: none;
        }

        .card-header h4 {
            font-weight: 700;
            margin: 0;
        }

        .card-body {
            padding: 32px;
        }

        .form-label {
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 12px;
            border: 1px solid #e0e7ed;
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 46, 103, 0.15);
            outline: none;
        }

        .form-control.is-invalid {
            border-color: var(--accent);
        }

        .invalid-feedback {
            color: var(--accent);
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .form-text {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 5px;
        }

        .alert {
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .alert-success {
            background-color: #d1e7dd;
            border-color: #badbcc;
            color: #0f5132;
        }

        .alert-danger {
            background-color: #f8d7da;
            border-color: #f5c2c7;
            color: #842029;
        }

        .alert-info {
            background-color: #cff4fc;
            border-color: #b6effb;
            color: #055160;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border: none;
            border-radius: 50px;
            padding: 12px 28px;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 46, 103, 0.3);
        }

        .btn-outline-secondary {
            border-radius: 50px;
            padding: 12px 28px;
            font-weight: 600;
            border: 2px solid var(--text);
            color: var(--primary);
            background: transparent;
            transition: var(--transition);
        }

        .btn-outline-secondary:hover {
            background: white;
            border-color: var(--accent);
            color: var(--accent-dark);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(230, 57, 70, 0.4);
        }

        .border-bottom {
            border-bottom: 2px solid var(--primary-light) !important;
        }

        h5 i {
            color: var(--primary);
            margin-right: 8px;
        }

        @media (max-width: 768px) {
            .card-body {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-hammer"></i> ToolsMarket48
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/profile}">
                <i class="bi bi-arrow-left me-1"></i> Назад в профиль
            </a>
        </div>
    </div>
</nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card">
                <div class="card-header">
                    <h4><i class="bi bi-pencil-square me-2"></i> Редактирование профиля</h4>
                </div>
                <div class="card-body">
                    <!-- Форма редактирования -->
                    <form th:action="@{/profile/update}" method="post" th:object="${userDto}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <!-- Общие ошибки -->
                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                            <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                        </div>

                        <!-- Флеш-сообщения -->
                        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                            <i class="bi bi-check-circle me-2"></i>
                            <span th:text="${successMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Основная информация -->
                        <div class="mb-4">
                            <h5 class="mb-3 pb-2 border-bottom">
                                <i class="bi bi-person-circle"></i> Основная информация
                            </h5>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Имя</label>
                                    <input type="text"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''"
                                           th:field="*{firstName}"
                                           placeholder="Ваше имя">
                                    <div th:if="${#fields.hasErrors('firstName')}" class="invalid-feedback">
                                        <div th:each="err : ${#fields.errors('firstName')}" th:text="${err}"></div>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Фамилия</label>
                                    <input type="text"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''"
                                           th:field="*{lastName}"
                                           placeholder="Ваша фамилия">
                                    <div th:if="${#fields.hasErrors('lastName')}" class="invalid-feedback">
                                        <div th:each="err : ${#fields.errors('lastName')}" th:text="${err}"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email <span class="text-danger">*</span></label>
                                <input type="email"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                       th:field="*{email}"
                                       placeholder="example@mail.com"
                                       required>
                                <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback">
                                    <div th:each="err : ${#fields.errors('email')}" th:text="${err}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Телефон</label>
                                <input type="tel"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                       th:field="*{phone}"
                                       placeholder="+7 (999) 123-45-67">
                                <div th:if="${#fields.hasErrors('phone')}" class="invalid-feedback">
                                    <div th:each="err : ${#fields.errors('phone')}" th:text="${err}"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Смена пароля -->
                        <div class="mb-4">
                            <h5 class="mb-3 pb-2 border-bottom">
                                <i class="bi bi-shield-lock"></i> Смена пароля
                            </h5>

                            <div class="alert alert-info mb-3">
                                <i class="bi bi-info-circle me-2"></i>
                                <strong>Как изменить пароль:</strong><br>
                                1. Введите текущий пароль<br>
                                2. Введите новый пароль (минимум 6 символов)<br>
                                3. Подтвердите новый пароль<br>
                                <small class="text-muted">Оставьте поля пустыми, если не хотите менять пароль</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Текущий пароль</label>
                                <input type="password"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid' : ''"
                                       th:field="*{currentPassword}"
                                       placeholder="Введите текущий пароль">
                                <p th:if="${#fields.hasErrors('currentPassword')}"
                                   th:errors="*{currentPassword}"
                                   class="invalid-feedback d-block">
                                </p>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Новый пароль</label>
                                <input type="password"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid' : ''"
                                       th:field="*{newPassword}"
                                       placeholder="Введите новый пароль">
                                <p th:if="${#fields.hasErrors('newPassword')}"
                                   th:errors="*{newPassword}"
                                   class="invalid-feedback d-block">
                                </p>
                                <div class="form-text">
                                    <i class="bi bi-info-circle"></i> Минимум 6 символов
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Подтвердите пароль</label>
                                <input type="password"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                                       th:field="*{confirmPassword}"
                                       placeholder="Повторите новый пароль">
                                <p th:if="${#fields.hasErrors('confirmPassword')}"
                                   th:errors="*{confirmPassword}"
                                   class="invalid-feedback d-block">
                                </p>
                            </div>
                        </div>

                        <!-- Кнопки -->
                        <div class="d-flex justify-content-between pt-2">
                            <a th:href="@{/profile}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-1"></i> Отмена
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-1"></i> Сохранить изменения
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
